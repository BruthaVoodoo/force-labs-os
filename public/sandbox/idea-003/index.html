<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Idea: Cron Health Heatmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 24px; }
    .badge { background: #1e3a5f; border: 1px solid #2563eb44; border-radius: 6px; padding: 4px 12px; font-size: 12px; color: #60a5fa; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; text-align: center; }
    p { color: #64748b; font-size: 13px; max-width: 340px; text-align: center; line-height: 1.6; }
    .heatmap { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; width: 100%; max-width: 280px; }
    .row { display: flex; gap: 3px; align-items: center; font-size: 11px; }
    .label { width: 80px; color: #64748b; text-align: right; margin-right: 8px; }
    .cells { display: flex; gap: 3px; flex-wrap: wrap; }
    .cell { width: 14px; height: 14px; border-radius: 2px; cursor: pointer; }
    .cell.success { background: #22c55e; }
    .cell.error { background: #ef4444; }
    .cell.none { background: #334155; opacity: 0.3; }
    .legend { display: flex; gap: 12px; font-size: 11px; margin-top: 12px; color: #64748b; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  </style>
</head>
<body>
  <span class="badge">Concept Preview</span>
  <h1>Cron Health Heatmap</h1>
  <p>Visual concept — GitHub-style heatmap showing 28 days of cron job run history.</p>
  <div class="heatmap">
    <div class="row">
      <div class="label">memory-audit</div>
      <div class="cells">
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell error"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
      </div>
    </div>
    <div class="row">
      <div class="label">security-scan</div>
      <div class="cells">
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
      </div>
    </div>
    <div class="row">
      <div class="label">backup-check</div>
      <div class="cells">
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell error"></div>
        <div class="cell error"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell error"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
        <div class="cell success"></div>
      </div>
    </div>
  </div>
  <div class="legend">
    <div><span class="legend-dot success"></span> Success</div>
    <div><span class="legend-dot error"></span> Error</div>
    <div><span class="legend-dot none"></span> No run</div>
  </div>
</body>
</html>
