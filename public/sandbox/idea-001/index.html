<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Idea: Dock Badge Notifications</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 24px; }
    .badge { background: #1e3a5f; border: 1px solid #2563eb44; border-radius: 6px; padding: 4px 12px; font-size: 12px; color: #60a5fa; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; text-align: center; }
    p { color: #64748b; font-size: 13px; max-width: 340px; text-align: center; line-height: 1.6; }
    .dock-demo { display: flex; gap: 12px; background: #1e293b88; backdrop-filter: blur(8px); border: 1px solid #334155; border-radius: 16px; padding: 12px 20px; margin-top: 8px; }
    .dock-btn { position: relative; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .dock-btn.ops { background: #fef08a22; border: 1px solid #eab30844; }
    .dock-btn.brain { background: #bfdbfe22; border: 1px solid #3b82f644; }
    .dock-btn.labs { background: #a7f3d022; border: 1px solid #10b98144; }
    .badge-dot { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 2px solid #0f172a; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  </style>
</head>
<body>
  <span class="badge">Prototype Preview</span>
  <h1>Dock Badge Notifications</h1>
  <p>Visual concept — red badge dots surface attention items without breaking flow.</p>
  <div class="dock-demo">
    <div class="dock-btn ops">⚡<span class="badge-dot"></span></div>
    <div class="dock-btn brain">🧠</div>
    <div class="dock-btn labs">🔬<span class="badge-dot"></span></div>
  </div>
</body>
</html>
